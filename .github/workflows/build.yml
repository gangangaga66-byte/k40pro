name: Build haydn Kernel A16

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Kernel
        run: |
          sudo apt update -y
          sudo apt install -y git build-essential bc bison flex libncurses5-dev libssl-dev libelf-dev zip

          # 只配置用户名，不碰 askpass
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # 下载内核源码
          git clone --depth 1 -b https://github.com/crdroidandroid/android_kernel_xiaomi_sm8350.git
          cd kernel

          # 配置
          make ARCH=arm64 lahaina_qgki_defconfig

          # 下载编译器
          git clone --depth 1 https://github.com/kdrag0n/proton-clang.git clang
          export PATH=$PWD/clang/bin:$PATH

          # 编译
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang Image.gz-dtb

          # 打包卡刷包
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp arch/arm64/boot/Image.gz-dtb anykernel/
          cd anykernel
          zip -r9 haydn-a16-kernel.zip * -x .git* README.md

          mkdir -p $GITHUB_WORKSPACE/out
          cp haydn-a16-kernel.zip $GITHUB_WORKSPACE/out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: haydn-a16-kernel
          path: out/
